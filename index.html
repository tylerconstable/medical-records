<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Medical Records</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  font-size: 14px;
  background: #f9f9f9;
  color: #111;
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
}

header {
  padding: 12px 20px;
  border-bottom: 1px solid #e8e8e8;
  background: #fff;
  display: flex;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
}
header h1 { font-size: 15px; font-weight: 600; color: #111; }
header span { color: #999; font-size: 12px; }
.hdr-btn {
  background: #f4f4f4; color: #444; border: 1px solid #ddd;
  padding: 5px 12px; border-radius: 6px;
  cursor: pointer; font-family: inherit; font-size: 12px;
}
.hdr-btn:hover { background: #e8e8e8; }

main {
  flex: 1;
  display: flex;
  overflow: hidden;
}

/* ── LEFT: DOCUMENTS ── */
#docs-col {
  width: 300px;
  min-width: 250px;
  border-right: 1px solid #e8e8e8;
  background: #fff;
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
}
#docs-col-hdr {
  padding: 12px 16px;
  border-bottom: 1px solid #e8e8e8;
  font-size: 12px;
  font-weight: 600;
  color: #666;
  text-transform: uppercase;
  letter-spacing: 0.04em;
}

/* Upload zone */
#upload-zone {
  margin: 12px;
  border: 2px dashed #ddd;
  border-radius: 8px;
  padding: 20px 16px;
  text-align: center;
  cursor: pointer;
  transition: border-color 0.15s, background 0.15s;
  color: #999;
  font-size: 13px;
}
#upload-zone:hover, #upload-zone.drag-over {
  border-color: #111;
  background: #f6f6f6;
  color: #111;
}
#upload-zone input { display: none; }
#upload-progress {
  margin: 0 12px 10px;
  font-size: 12px;
  color: #2563eb;
  display: none;
}

/* Document list */
#docs-list {
  flex: 1;
  overflow-y: auto;
  padding: 4px 8px 8px;
}
.doc-item {
  padding: 9px 10px;
  border-radius: 6px;
  display: flex;
  flex-direction: column;
  gap: 2px;
  cursor: default;
  border: 1px solid transparent;
}
.doc-item:hover { background: #f6f6f6; border-color: #eee; }
.doc-name { font-size: 13px; color: #111; font-weight: 500; word-break: break-word; }
.doc-meta { font-size: 11px; color: #999; display: flex; justify-content: space-between; }
.doc-del {
  background: none; border: none; color: #ccc;
  cursor: pointer; font-size: 14px; align-self: flex-start;
  padding: 0; line-height: 1;
}
.doc-del:hover { color: #dc2626; }
.doc-row { display: flex; align-items: flex-start; gap: 6px; }

/* ── RIGHT: QUERY ── */
#query-col {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
#answers {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 20px;
}
.q-block { display: flex; flex-direction: column; gap: 8px; }
.q-text {
  align-self: flex-end;
  background: #f0f4ff;
  border: 1px solid #d0daff;
  padding: 9px 14px;
  border-radius: 8px;
  max-width: 80%;
  font-size: 14px;
}
.a-text {
  background: #fff;
  border: 1px solid #e8e8e8;
  border-radius: 8px;
  padding: 14px 16px;
  font-size: 14px;
  line-height: 1.7;
  max-width: 100%;
  white-space: pre-wrap;
}
.a-text strong { font-weight: 600; }
.empty-state {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  color: #bbb;
  gap: 8px;
  font-size: 14px;
}

#query-input-wrap {
  display: flex;
  gap: 8px;
  padding: 14px 20px;
  border-top: 1px solid #e8e8e8;
  background: #fff;
  flex-shrink: 0;
}
#query-input {
  flex: 1;
  border: 1px solid #ddd;
  border-radius: 6px;
  padding: 9px 12px;
  font-family: inherit;
  font-size: 14px;
  outline: none;
  resize: none;
  line-height: 1.4;
  background: #fff;
}
#query-input:focus { border-color: #aaa; }
#query-send {
  background: #111; color: #fff; border: none;
  padding: 8px 18px; border-radius: 6px;
  cursor: pointer; font-family: inherit; font-size: 14px;
  align-self: flex-end;
}
#query-send:hover { background: #333; }
#query-send:disabled { opacity: 0.4; cursor: default; }

/* ── DATE MODAL ── */
#date-modal {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.35);
  display: none; align-items: center; justify-content: center;
  z-index: 100;
}
#date-modal.open { display: flex; }
#date-inner {
  background: #fff;
  border-radius: 10px;
  padding: 24px;
  width: 380px;
  display: flex;
  flex-direction: column;
  gap: 14px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.12);
}
#date-inner h2 { font-size: 15px; font-weight: 600; }
#date-inner p { font-size: 13px; color: #666; line-height: 1.5; }
#date-input {
  border: 1px solid #ddd; border-radius: 6px;
  padding: 8px 10px; font-family: inherit; font-size: 14px;
  outline: none; width: 100%;
}
#date-input:focus { border-color: #aaa; }
.date-btns { display: flex; gap: 8px; justify-content: flex-end; }
.date-btns button {
  padding: 7px 16px; border-radius: 6px;
  cursor: pointer; font-family: inherit; font-size: 13px;
  border: 1px solid #ddd; background: #f4f4f4; color: #444;
}
.date-btns button.primary {
  background: #111; color: #fff; border-color: #111;
}
.date-btns button.primary:hover { background: #333; }

/* ── LABS VIEW ── */
#labs-panel {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.35);
  display: none; align-items: flex-start; justify-content: flex-end;
  z-index: 100;
}
#labs-panel.open { display: flex; }
#labs-inner {
  background: #fff;
  width: 600px; height: 100%;
  border-left: 1px solid #e8e8e8;
  display: flex; flex-direction: column;
}
#labs-hdr {
  display: flex; align-items: center; gap: 8px;
  padding: 14px 16px; border-bottom: 1px solid #e8e8e8; flex-shrink: 0;
}
#labs-hdr strong { flex: 1; font-size: 14px; }
#labs-search {
  border: 1px solid #ddd; border-radius: 6px;
  padding: 6px 10px; font-family: inherit; font-size: 13px;
  outline: none; width: 180px;
}
#labs-search:focus { border-color: #aaa; }
#labs-body { flex: 1; overflow-y: auto; padding: 12px; }
.lab-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 12px;
}
.lab-card {
  border: 1px solid #e8e8e8;
  border-radius: 8px;
  padding: 10px 12px 8px;
  cursor: pointer;
  background: #fff;
  transition: box-shadow 0.15s;
}
.lab-card:hover { box-shadow: 0 2px 12px rgba(0,0,0,0.08); border-color: #ccc; }
.lab-card-name { font-size: 12px; font-weight: 600; color: #111; margin-bottom: 2px; }
.lab-card-latest { font-size: 11px; color: #999; margin-bottom: 6px; }
.lab-card-latest .val-high { color: #dc2626; font-weight: 600; }
.lab-card-latest .val-low  { color: #2563eb; font-weight: 600; }
.lab-card-chart { height: 60px; position: relative; }

/* ── CHART MODAL ── */
#chart-modal {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.4);
  display: none; align-items: center; justify-content: center;
  z-index: 200;
}
#chart-modal.open { display: flex; }
#chart-inner {
  background: #fff;
  border-radius: 10px;
  padding: 24px;
  width: min(700px, 90vw);
  display: flex; flex-direction: column; gap: 14px;
  box-shadow: 0 8px 40px rgba(0,0,0,0.15);
}
#chart-title { font-size: 15px; font-weight: 600; }
#chart-meta { font-size: 12px; color: #999; }
#chart-wrap { position: relative; height: 280px; }
#chart-close {
  align-self: flex-end;
  background: #f4f4f4; border: 1px solid #ddd; color: #444;
  padding: 5px 14px; border-radius: 6px;
  cursor: pointer; font-family: inherit; font-size: 13px;
}
#chart-close:hover { background: #e8e8e8; }
</style>
</head>
<body>

<header>
  <h1>Medical Records</h1>
  <button class="hdr-btn" onclick="openLabs()">Labs over time</button>
  <span id="header-status" style="margin-left:auto;color:#999;font-size:12px"></span>
</header>

<main>
  <!-- LEFT: documents -->
  <div id="docs-col">
    <div id="docs-col-hdr">Documents</div>
    <div id="upload-zone" onclick="document.getElementById('file-input').click()"
         ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" ondrop="onDrop(event)">
      <input type="file" id="file-input" accept=".pdf" multiple onchange="handleFiles(this.files)">
      Drop PDFs here or click to upload
    </div>
    <div id="upload-progress"></div>
    <div id="docs-list"><div style="padding:8px 10px;color:#bbb;font-size:12px">No documents yet</div></div>
  </div>

  <!-- RIGHT: query -->
  <div id="query-col">
    <div id="answers">
      <div class="empty-state">
        <div>Upload your medical records, then ask anything.</div>
        <div style="font-size:12px">e.g. "What was my last HbA1c?" or "Summarize my cardiology visits"</div>
      </div>
    </div>
    <div id="query-input-wrap">
      <textarea id="query-input" rows="2"
        placeholder="Ask a question about your records… (Enter to send)"
        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();askQuestion();}"></textarea>
      <button id="query-send" onclick="askQuestion()">Ask</button>
    </div>
  </div>
</main>

<!-- LABS PANEL -->
<div id="labs-panel" onclick="if(event.target===this)closeLabs()">
  <div id="labs-inner">
    <div id="labs-hdr">
      <strong>Lab Values Over Time</strong>
      <input id="labs-search" type="text" placeholder="Filter tests…" oninput="filterLabs(this.value)">
      <button class="hdr-btn" onclick="closeLabs()">Close</button>
    </div>
    <div id="labs-body"><div style="color:#bbb;padding:20px">No lab values extracted yet.</div></div>
  </div>
</div>

<!-- CHART MODAL -->
<div id="chart-modal" onclick="if(event.target===this)closeChart()">
  <div id="chart-inner">
    <div>
      <div id="chart-title"></div>
      <div id="chart-meta"></div>
    </div>
    <div id="chart-wrap"><canvas id="chart-canvas"></canvas></div>
    <button id="chart-close" onclick="closeChart()">Close</button>
  </div>
</div>

<!-- DATE MODAL -->
<div id="date-modal">
  <div id="date-inner">
    <h2 id="date-modal-title">Document date</h2>
    <p id="date-modal-msg"></p>
    <input type="date" id="date-input">
    <div class="date-btns">
      <button onclick="cancelUpload()">Cancel</button>
      <button onclick="confirmDate(true)">Skip date</button>
      <button class="primary" onclick="confirmDate(false)">Continue</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/pyodide/v0.26.4/full/pyodide.js" defer></script>
<script>
const _supa = supabase.createClient(
  'https://jkitmbtrpswcotgsxpwg.supabase.co',
  'sb_publishable_Pzt-KZGmSl0ebkUwbuvYFg_5ksz0uHq'
);

// ── PDF TEXT EXTRACTION ───────────────────────────────────────────────
let _pdfjsReady = false;
const _pdfjsScript = document.createElement('script');
_pdfjsScript.src = 'https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.min.js';
_pdfjsScript.onload = () => {
  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.worker.min.js';
  _pdfjsReady = true;
};
document.head.appendChild(_pdfjsScript);

async function extractPdfText(file) {
  const arrayBuffer = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
  const pages = [];
  for (let i = 1; i <= pdf.numPages; i++) {
    const page = await pdf.getPage(i);
    const content = await page.getTextContent();
    const text = content.items.map(item => item.str).join(' ');
    pages.push({ page: i, text });
  }
  return { pages, pdf };
}

// Read PDF file as base64 for direct upload to OpenAI
async function readPdfAsBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = e => resolve(e.target.result.split(',')[1]);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

// ── DATE DETECTION ────────────────────────────────────────────────────
function findDateInText(text) {
  const patterns = [
    /\b(January|February|March|April|May|June|July|August|September|October|November|December)\s+\d{1,2},?\s+\d{4}\b/i,
    /\b\d{1,2}[\/\-]\d{1,2}[\/\-]\d{4}\b/,
    /\b\d{4}[\/\-]\d{1,2}[\/\-]\d{1,2}\b/,
    /\b\d{1,2}\s+(January|February|March|April|May|June|July|August|September|October|November|December)\s+\d{4}\b/i,
  ];
  for (const p of patterns) {
    const m = text.match(p);
    if (m) return m[0];
  }
  return null;
}

// ── CHUNKING ──────────────────────────────────────────────────────────
function chunkPages(pages) {
  const chunks = [];
  const CHUNK_WORDS = 400;
  const OVERLAP_WORDS = 50;

  for (const { page, text } of pages) {
    const words = text.split(/\s+/).filter(w => w.length > 0);
    for (let i = 0; i < words.length; i += CHUNK_WORDS - OVERLAP_WORDS) {
      const slice = words.slice(i, i + CHUNK_WORDS).join(' ').trim();
      if (slice.length > 30) chunks.push({ content: slice, page });
    }
  }
  return chunks;
}

// ── UPLOAD FLOW ───────────────────────────────────────────────────────
let _pendingFiles = [];
let _pendingIdx = 0;
let _pendingPages = null;
let _pendingChunks = null;

function onDragOver(e) { e.preventDefault(); document.getElementById('upload-zone').classList.add('drag-over'); }
function onDragLeave()  { document.getElementById('upload-zone').classList.remove('drag-over'); }
function onDrop(e)      { e.preventDefault(); onDragLeave(); handleFiles(e.dataTransfer.files); }

async function handleFiles(fileList) {
  if (!_pdfjsReady) { alert('PDF reader still loading, try again in a moment.'); return; }
  _pendingFiles = Array.from(fileList).filter(f => f.type === 'application/pdf');
  _pendingIdx = 0;
  processNextFile();
}

async function processNextFile() {
  if (_pendingIdx >= _pendingFiles.length) return;
  const file = _pendingFiles[_pendingIdx];
  setProgress(`Extracting text from ${file.name}…`);

  try {
    const { pages } = await extractPdfText(file);
    const firstPageText = pages[0]?.text || '';
    const foundDate = findDateInText(firstPageText);
    _pendingPages = pages;
    _pendingChunks = chunkPages(pages);

    // Show date modal
    const titleEl = document.getElementById('date-modal-title');
    const msgEl   = document.getElementById('date-modal-msg');
    const inp     = document.getElementById('date-input');

    if (foundDate) {
      titleEl.textContent = 'Confirm document date';
      msgEl.textContent = `Found "${foundDate}" in ${file.name}. If this document spans multiple dates (e.g. a panel over time), click Skip — dates will be extracted per result automatically.`;
      const parsed = new Date(foundDate);
      inp.value = isNaN(parsed) ? '' : parsed.toISOString().split('T')[0];
    } else {
      titleEl.textContent = 'Document date';
      msgEl.textContent = `No date found in "${file.name}". Enter one if it's a single-date document, or Skip — dates will be extracted per lab result automatically.`;
      inp.value = '';
    }
    document.getElementById('date-modal').classList.add('open');
  } catch(e) {
    setProgress(`Error reading ${file.name}: ${e.message}`);
  }
}

function cancelUpload() {
  document.getElementById('date-modal').classList.remove('open');
  _pendingPages = null;
  _pendingChunks = null;
  _pendingIdx++;
  processNextFile();
}

async function confirmDate(skip = false) {
  const date = skip ? null : document.getElementById('date-input').value;
  if (!skip && !date) { document.getElementById('date-input').focus(); return; }
  document.getElementById('date-modal').classList.remove('open');

  const file = _pendingFiles[_pendingIdx];
  setProgress(`Uploading "${file.name}"…`);

  try {
    // 1. Insert document record
    const { data: doc, error: docErr } = await _supa
      .from('documents')
      .insert({ name: file.name, date })
      .select()
      .single();
    if (docErr) throw new Error(docErr.message);

    // 2. Send chunks to embed API
    setProgress(`Embedding ${_pendingChunks.length} chunks from "${file.name}"…`);
    const res = await fetch('/api/embed', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ document_id: doc.id, chunks: _pendingChunks }),
    });
    const result = await res.json();
    if (!res.ok) throw new Error(result.error || 'embed failed');

    // 3. Second pass — upload PDF directly to OpenAI, extract all lab values at once
    setProgress(`Uploading PDF for lab extraction…`);
    const pdf_base64 = await readPdfAsBase64(file);
    const labRes = await fetch('/api/parse-labs', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ document_id: doc.id, pdf_base64, filename: file.name, date }),
    });
    const labResult = await labRes.json();
    const totalLabs = labResult.count || 0;
    const labMsg = totalLabs > 0 ? `, ${totalLabs} lab values extracted` : '';

    setProgress(`Done — ${result.chunks} chunks stored${labMsg}.`);
    setTimeout(() => setProgress(''), 4000);
    await loadDocuments();
  } catch(e) {
    setProgress(`Error: ${e.message}`);
  }

  _pendingIdx++;
  processNextFile();
}

function setProgress(msg) {
  const el = document.getElementById('upload-progress');
  el.textContent = msg;
  el.style.display = msg ? 'block' : 'none';
}

// ── DOCUMENTS LIST ────────────────────────────────────────────────────
let _documents = [];

async function loadDocuments() {
  const { data } = await _supa.from('documents').select('*').order('date', { ascending: false });
  _documents = data || [];
  renderDocuments();
}

function renderDocuments() {
  const list = document.getElementById('docs-list');
  if (!_documents.length) {
    list.innerHTML = '<div style="padding:8px 10px;color:#bbb;font-size:12px">No documents yet</div>';
    return;
  }
  list.innerHTML = _documents.map(d => `
    <div class="doc-item">
      <div class="doc-row">
        <div class="doc-name" style="flex:1">${esc(d.name)}</div>
        <button class="doc-del" onclick="deleteDoc('${d.id}')" title="Delete">×</button>
      </div>
      <div class="doc-meta">
        <span>${d.date || 'no date'}</span>
      </div>
    </div>
  `).join('');
}

async function deleteDoc(id) {
  if (!confirm('Delete this document and all its chunks?')) return;
  await _supa.from('documents').delete().eq('id', id);
  _documents = _documents.filter(d => d.id !== id);
  renderDocuments();
}

// ── QUERY ─────────────────────────────────────────────────────────────
async function askQuestion() {
  const inp = document.getElementById('query-input');
  const question = inp.value.trim();
  if (!question) return;
  inp.value = '';

  const answers = document.getElementById('answers');
  // Clear empty state
  answers.querySelector('.empty-state')?.remove();

  const block = document.createElement('div');
  block.className = 'q-block';
  block.innerHTML = `<div class="q-text">${esc(question)}</div><div class="a-text" id="a-streaming">Searching records…</div>`;
  answers.appendChild(block);
  answers.scrollTop = answers.scrollHeight;

  const aEl = block.querySelector('#a-streaming');
  aEl.removeAttribute('id');

  const btn = document.getElementById('query-send');
  btn.disabled = true;

  try {
    const res = await fetch('/api/query', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ question }),
    });

    if (!res.ok) {
      const err = await res.json();
      aEl.textContent = 'Error: ' + (err.error || 'unknown error');
      return;
    }

    const reader = res.body.getReader();
    const dec = new TextDecoder();
    let buf = '';
    let full = '';

    aEl.textContent = '';
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += dec.decode(value, { stream: true });
      const lines = buf.split('\n'); buf = lines.pop();
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const raw = line.slice(6).trim();
        if (raw === '[DONE]') continue;
        try {
          const j = JSON.parse(raw);
          full += j.choices?.[0]?.delta?.content || '';
          aEl.textContent = full;
          answers.scrollTop = answers.scrollHeight;
        } catch {}
      }
    }
  } catch(e) {
    aEl.textContent = 'Error: ' + e.message;
  } finally {
    btn.disabled = false;
  }
}

// ── LABS VIEW ─────────────────────────────────────────────────────────
let _allLabValues = [];

async function openLabs() {
  const { data } = await _supa
    .from('lab_values')
    .select('*')
    .order('date', { ascending: true });
  _allLabValues = data || [];
  renderLabs(_allLabValues);
  document.getElementById('labs-panel').classList.add('open');
}

function closeLabs() {
  document.getElementById('labs-panel').classList.remove('open');
}

function filterLabs(q) {
  const filtered = q.trim()
    ? _allLabValues.filter(lv => lv.test_name.toLowerCase().includes(q.toLowerCase()))
    : _allLabValues;
  renderLabs(filtered);
}

const _miniCharts = {};

function renderLabs(values) {
  const body = document.getElementById('labs-body');
  if (!values.length) {
    body.innerHTML = '<div style="color:#bbb;padding:20px">No lab values found.</div>';
    return;
  }

  // Destroy existing mini charts
  Object.values(_miniCharts).forEach(c => c.destroy());
  Object.keys(_miniCharts).forEach(k => delete _miniCharts[k]);

  const byTest = {};
  for (const lv of values) {
    if (!byTest[lv.test_name]) byTest[lv.test_name] = [];
    byTest[lv.test_name].push(lv);
  }
  const sorted = Object.entries(byTest).sort((a, b) => a[0].localeCompare(b[0]));

  body.innerHTML = `<div class="lab-grid">${sorted.map(([name]) => {
    const id = 'mini-' + name.replace(/\W/g, '_');
    return `<div class="lab-card" onclick="showChart(${JSON.stringify(name)})">
      <div class="lab-card-name">${esc(name)}</div>
      <div class="lab-card-latest" id="latest-${id}"></div>
      <div class="lab-card-chart"><canvas id="${id}"></canvas></div>
    </div>`;
  }).join('')}</div>`;

  // Render each mini sparkline
  sorted.forEach(([name, rows]) => {
    const dated = rows.filter(r => r.value && r.date).sort((a, b) => a.date.localeCompare(b.date));
    const id = 'mini-' + name.replace(/\W/g, '_');
    const latest = dated[dated.length - 1];
    const unit = rows.find(r => r.unit)?.unit || '';

    // Latest value label
    const latestEl = document.getElementById('latest-' + id);
    if (latestEl && latest) {
      const flagCls = latest.flag === 'High' || latest.flag === 'Critical' ? 'val-high' : latest.flag === 'Low' ? 'val-low' : '';
      latestEl.innerHTML = `<span class="${flagCls}">${latest.value} ${unit}</span> · ${latest.date}`;
    }

    const canvas = document.getElementById(id);
    if (!canvas || dated.length < 2) return;

    const pointColors = dated.map(r =>
      r.flag === 'High' || r.flag === 'Critical' ? '#dc2626' : r.flag === 'Low' ? '#2563eb' : '#111'
    );

    _miniCharts[name] = new Chart(canvas, {
      type: 'line',
      data: {
        labels: dated.map(r => r.date),
        datasets: [{
          data: dated.map(r => parseFloat(r.value)),
          borderColor: '#111',
          borderWidth: 1.5,
          pointBackgroundColor: pointColors,
          pointRadius: 3,
          tension: 0.3,
          fill: false,
        }],
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { display: false }, tooltip: { enabled: false } },
        scales: { x: { display: false }, y: { display: false } },
        animation: false,
      },
    });
  });
}

// ── CHARTS ────────────────────────────────────────────────────────────
let _activeChart = null;

function showChart(testName) {
  const rows = _allLabValues
    .filter(lv => lv.test_name === testName && lv.value && lv.date)
    .sort((a, b) => a.date.localeCompare(b.date));

  if (!rows.length) { alert('No dated values for ' + testName); return; }

  const unit = rows.find(r => r.unit)?.unit || '';
  const labels = rows.map(r => r.date);
  const values = rows.map(r => parseFloat(r.value));

  // Reference range band (use most common reference range)
  const refRanges = rows.map(r => r.reference_range).filter(Boolean);
  const refRange = refRanges[0] || null;
  let refLow = null, refHigh = null;
  if (refRange) {
    const m = refRange.match(/([\d.]+)\s*[-–]\s*([\d.]+)/);
    if (m) { refLow = parseFloat(m[1]); refHigh = parseFloat(m[2]); }
  }

  // Point colors based on flag
  const pointColors = rows.map(r => {
    if (r.flag === 'High' || r.flag === 'Critical') return '#dc2626';
    if (r.flag === 'Low') return '#2563eb';
    return '#111';
  });

  document.getElementById('chart-title').textContent = testName;
  document.getElementById('chart-meta').textContent =
    `${rows.length} data points${unit ? ' · ' + unit : ''}${refRange ? ' · ref: ' + refRange : ''}`;
  document.getElementById('chart-modal').classList.add('open');

  if (_activeChart) { _activeChart.destroy(); _activeChart = null; }

  const datasets = [{
    label: testName,
    data: values,
    borderColor: '#111',
    backgroundColor: 'rgba(17,17,17,0.05)',
    pointBackgroundColor: pointColors,
    pointRadius: 5,
    pointHoverRadius: 7,
    tension: 0.3,
    fill: false,
  }];

  // Add reference range as a shaded band
  if (refLow !== null && refHigh !== null) {
    datasets.push({
      label: 'Reference range',
      data: labels.map(() => refHigh),
      borderColor: 'rgba(22,163,74,0.3)',
      backgroundColor: 'rgba(22,163,74,0.08)',
      pointRadius: 0,
      fill: '+1',
      tension: 0,
    });
    datasets.push({
      label: '_refLow',
      data: labels.map(() => refLow),
      borderColor: 'rgba(22,163,74,0.3)',
      backgroundColor: 'rgba(22,163,74,0.08)',
      pointRadius: 0,
      fill: false,
      tension: 0,
    });
  }

  _activeChart = new Chart(document.getElementById('chart-canvas'), {
    type: 'line',
    data: { labels, datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: ctx => {
              const row = rows[ctx.dataIndex];
              return `${ctx.parsed.y} ${unit}${row?.flag ? ' [' + row.flag + ']' : ''}`;
            },
          },
        },
      },
      scales: {
        x: { grid: { color: '#f0f0f0' }, ticks: { maxRotation: 45 } },
        y: {
          grid: { color: '#f0f0f0' },
          ticks: { callback: v => v + (unit ? ' ' + unit : '') },
        },
      },
    },
  });
}

function closeChart() {
  document.getElementById('chart-modal').classList.remove('open');
  if (_activeChart) { _activeChart.destroy(); _activeChart = null; }
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// init
loadDocuments();
</script>
